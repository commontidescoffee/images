<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Common Tides — Weekly Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07111a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 14px 40px;
      font-family: 'DM Sans', sans-serif;
      gap: 14px;
    }

    /* ── UI Controls ─────────────────── */
    .ui-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ui-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #4A9E93;
      color: #fff;
      border: none;
      padding: 11px 22px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(74,158,147,0.3);
      transition: background 0.15s, transform 0.1s;
    }
    .ui-btn:hover { background: #3a8a7f; }
    .ui-btn:active { transform: scale(0.97); }
    .ui-btn.ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: none;
    }
    .ui-btn.ghost:hover { background: rgba(255,255,255,0.1); }
    .ui-hint {
      color: rgba(255,255,255,0.25);
      font-size: 11.5px;
      text-align: center;
    }

    /* ── Week picker ─────────────────── */
    .week-picker {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      overflow: hidden;
    }
    .week-arrow {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      width: 36px;
      height: 38px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .week-arrow:hover { background: rgba(74,158,147,0.2); color: #fff; }
    .week-picker-label {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      padding: 0 14px;
      white-space: nowrap;
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
      line-height: 38px;
      min-width: 110px;
      text-align: center;
    }

    /* ── Calendar status banner ──────── */
    #calStatus {
      display: none;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      text-align: center;
      max-width: 540px;
    }
    #calStatus.loading { background: rgba(74,158,147,0.15); color: #4A9E93; display: block; }
    #calStatus.success { background: rgba(74,158,147,0.12); color: #5EB3A7; display: block; }
    #calStatus.error   { background: rgba(220,80,80,0.12);  color: #e07070; display: block; }

    /* ── Scale wrapper ───────────────── */
    #scaleWrap {
      transform-origin: top center;
      flex-shrink: 0;
    }

    /* ── Instagram card 1080×1350 ────── */
    .ig-card {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background: #0B1A26;
      font-family: 'DM Sans', sans-serif;
    }

    /* Background SVG */
    .bg-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Subtle dot grid */
    .dot-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(74,158,147,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Card body */
    .card-body {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 56px 72px 50px;
    }

    /* ── Header ──────────────────────── */
    .hdr {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 34px;
      flex-shrink: 0;
    }
    .logo-wrap img {
      height: 66px;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }
    .hdr-eyebrow {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.38em;
      color: #4A9E93;
      text-transform: uppercase;
    }
    .hdr-title {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      font-weight: 900;
      color: #fff;
      line-height: 1.02;
      margin-top: 4px;
      letter-spacing: -0.5px;
    }
    .week-range {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.04em;
      min-height: 20px;
    }
    .wave-divider {
      margin-top: 16px;
      width: 100%;
    }

    /* ── Days ────────────────────────── */
    .days {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .day-row {
      display: flex;
      align-items: stretch;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(74,158,147,0.18);
      border-radius: 16px;
      overflow: hidden;
      flex: 1;
      transition: border-color 0.2s, background 0.2s;
    }
    .day-row:focus-within {
      border-color: rgba(74,158,147,0.48);
      background: rgba(74,158,147,0.04);
    }
    .day-row.weekend { border-color: rgba(74,158,147,0.22); }

    /* Day pill */
    .day-pill {
      width: 96px;
      flex-shrink: 0;
      background: linear-gradient(165deg, #1e5e56 0%, #2d7a70 50%, #4A9E93 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .day-row.weekend .day-pill {
      background: linear-gradient(165deg, #163a35 0%, #1e5e56 55%, #2d7a70 100%);
    }
    .day-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
    }

    /* Fields */
    .day-fields {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 16px 24px 16px 26px;
      gap: 0;
    }

    .field-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-group.time-group {
      flex: 0 0 220px;
      padding-left: 24px;
      border-left: 1px solid rgba(255,255,255,0.07);
    }

    .field-lbl {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(74,158,147,0.7);
      user-select: none;
    }
    .field-val {
      font-family: 'DM Sans', sans-serif;
      font-size: 23px;
      font-weight: 600;
      color: #fff;
      outline: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 2px;
      min-height: 32px;
      letter-spacing: 0.01em;
      line-height: 1.25;
      transition: border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }
    .field-val:focus { border-bottom-color: rgba(74,158,147,0.55); }

    /* ── Footer ──────────────────────── */
    .footer {
      flex-shrink: 0;
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(74,158,147,0.4); }
    .footer-handle {
      font-size: 14px;
      font-weight: 700;

      letter-spacing: 0.05em;
    }
    .footer-text {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
    }
  </style>

  <script>
    const CALENDAR_ID = 'e5d97565d2e53eae215c9b87e2a193617d2f7e019de3c8e6ccb3be0f2ac6ee27@group.calendar.google.com'
    const API_KEY     = 'AIzaSyCSiXr9WwISuQJlIQtdSZ3xEPQsTkv_etY'

    let weekOffset = 0 // 0 = this week, 1 = next week, -1 = last week

    // ── Shift week and reload ─────────────────
    function shiftWeek(dir) {
      weekOffset += dir
      updateWeekPickerLabel()
      loadCalendar()
    }

    function updateWeekPickerLabel() {
      const el = document.getElementById('weekPickerLabel')
      if (weekOffset === 0) el.textContent = 'This Week'
      else if (weekOffset === 1) el.textContent = 'Next Week'
      else if (weekOffset === -1) el.textContent = 'Last Week'
      else el.textContent = weekOffset > 0 ? `+${weekOffset} Weeks` : `${weekOffset} Weeks`
    }

    // ── Week bounds (Mon–Sun) ─────────────────
    function getWeekBounds() {
      const today = new Date()
      const dow = today.getDay() // 0=Sun
      const monday = new Date(today)
      monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + weekOffset * 7)
      monday.setHours(0, 0, 0, 0)
      const sunday = new Date(monday)
      sunday.setDate(monday.getDate() + 6)
      sunday.setHours(23, 59, 59, 999)
      return { monday, sunday }
    }

    // ── Format time "8:00 AM" → "8 AM" ────────
    function fmtTime(dtStr) {
      if (!dtStr) return ''
      const d = new Date(dtStr)
      let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM'
      h = h % 12 || 12
      return m === 0 ? `${h} ${ampm}` : `${h}:${String(m).padStart(2,'0')} ${ampm}`
    }

    // ── Format week label "Mar 31 – Apr 6, 2026" ─
    function fmtWeekLabel(monday, sunday) {
      const opts = { month: 'short', day: 'numeric' }
      const s = monday.toLocaleDateString('en-US', opts)
      const e = sunday.toLocaleDateString('en-US', { ...opts, year: 'numeric' })
      return `${s} – ${e}`
    }

    // ── Status helper ─────────────────────────
    function setStatus(msg, type) {
      const el = document.getElementById('calStatus')
      el.textContent = msg
      el.className = type
    }

    // ── Load calendar ─────────────────────────
    async function loadCalendar() {
      const { monday, sunday } = getWeekBounds()
      setStatus('Loading from Google Calendar…', 'loading')

      const url = new URL(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`)
      url.searchParams.set('key', API_KEY)
      url.searchParams.set('timeMin', monday.toISOString())
      url.searchParams.set('timeMax', sunday.toISOString())
      url.searchParams.set('singleEvents', 'true')
      url.searchParams.set('orderBy', 'startTime')
      url.searchParams.set('maxResults', '50')

      try {
        const res = await fetch(url)
        const data = await res.json()

        if (!res.ok) {
          if (res.status === 403) {
            setStatus('API key not authorized for this domain. In Google Cloud Console → Credentials, add "commontidescoffee.github.io/*" to the API key\'s allowed referrers.', 'error')
          } else {
            setStatus(`Calendar error: ${data.error?.message || res.status}`, 'error')
          }
          return
        }

        // Clear existing fields
        document.querySelectorAll('.field-val').forEach(el => el.textContent = '')

        const events = data.items || []
        let filled = 0

        events.forEach(ev => {
          const startStr = ev.start?.dateTime || ev.start?.date
          if (!startStr) return

          const evDate = new Date(startStr)
          const dayNum = evDate.getDay() // 0=Sun,1=Mon…6=Sat

          const row = document.querySelector(`.day-row[data-day="${dayNum}"]`)
          if (!row) return

          const locEl  = row.querySelector('.loc')
          const timeEl = row.querySelector('.time')

          // Only fill if not already filled (first event per day wins)
          if (!locEl.textContent.trim()) {
            locEl.textContent = ev.summary || ev.location || ''
          }
          if (!timeEl.textContent.trim() && ev.start?.dateTime) {
            const start = fmtTime(ev.start.dateTime)
            const end   = fmtTime(ev.end?.dateTime)
            timeEl.textContent = end ? `${start} – ${end}` : start
          }
          filled++
        })

        // Set week range label
        document.getElementById('weekRange').textContent = fmtWeekLabel(monday, sunday)

        setStatus(`✓ Loaded ${events.length} event${events.length !== 1 ? 's' : ''} · Edit any field before saving`, 'success')
        setTimeout(() => setStatus('', ''), 5000)

      } catch(err) {
        setStatus('Network error — check your internet connection and try again.', 'error')
        console.error(err)
      }
    }

    // ── Clear all ─────────────────────────────
    function clearAll() {
      document.querySelectorAll('.field-val').forEach(el => el.textContent = '')
      document.getElementById('weekRange').textContent = ''
      setStatus('', '')
    }

    // ── Scale to viewport ─────────────────────
    function scaleCard() {
      const wrap = document.getElementById('scaleWrap')
      const scale = Math.min((window.innerWidth - 28) / 1080, (window.innerHeight - 120) / 1350, 1)
      wrap.style.transform = `scale(${scale})`
      wrap.style.height = Math.round(1350 * scale) + 'px'
      wrap.style.width  = Math.round(1080 * scale) + 'px'
    }
    scaleCard()
    window.addEventListener('resize', scaleCard)

    // ── Save as PNG ───────────────────────────
    async function saveImage() {
      if (document.activeElement?.blur) document.activeElement.blur()
      const uiBar  = document.getElementById('uiBar')
      const uiHint = document.getElementById('uiHint')
      const status = document.getElementById('calStatus')
      const wrap   = document.getElementById('scaleWrap')

      uiBar.style.visibility  = 'hidden'
      uiHint.style.visibility = 'hidden'
      status.style.visibility = 'hidden'

      const prev = { t: wrap.style.transform, h: wrap.style.height, w: wrap.style.width }
      wrap.style.transform = 'scale(1)'
      wrap.style.height = '1350px'
      wrap.style.width  = '1080px'

      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)))
      await new Promise(r => setTimeout(r, 100))

      try {
        const canvas = await html2canvas(document.getElementById('igCard'), {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: '#0B1A26',
          width: 1080,
          height: 1350,
          logging: false,
          imageTimeout: 14000,
        })
        const today = new Date()
        const mm = String(today.getMonth()+1).padStart(2,'0')
        const dd = String(today.getDate()).padStart(2,'0')
        const a = document.createElement('a')
        a.download = `ct-schedule-${mm}${dd}.png`
        a.href = canvas.toDataURL('image/png')
        a.click()
      } catch(e) {
        alert('Could not save image. Try a full-page screenshot instead.\n\n' + e.message)
      }

      wrap.style.transform = prev.t
      wrap.style.height = prev.h
      wrap.style.width  = prev.w
      uiBar.style.visibility  = 'visible'
      uiHint.style.visibility = 'visible'
      status.style.visibility = 'visible'
    }

    // Auto-load on open
    loadCalendar()
  </script>
</body>
</html>
